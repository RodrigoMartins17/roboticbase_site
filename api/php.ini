; Configuracao do PHP no Vercel.
; Subo os limites de upload para as fotos de perfil/materiais
; (o codigo depois comprime-as antes de as guardar na base de dados).
upload_max_filesize = 6M
post_max_size = 8M
memory_limit = 256M
display_errors = Off
; Amortecedor de output (igual ao XAMPP): se algum ficheiro deixar escapar
; um espaco/linha antes de um redirect, o redirect continua a funcionar
; em vez de dar pagina em branco.
output_buffering = 4096
